services:
  - type: worker
    name: vouch-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vouch-db
          property: connectionString
    plan: free

databases:
  - name: vouch-db
    plan: free
