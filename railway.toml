services:
  - type: web
    name: vouch-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vouch-db
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: vouch-db
    plan: free
